<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パパどこ？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #1a1728;
      color: #e0d8f8;
      height: 100dvh;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .page-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #7060a8;
      text-align: center;
      flex-shrink: 0;
    }
    .card {
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      box-shadow: 0 3px 16px rgba(0,0,0,0.35);
      position: relative;
    }
    .card.c-home     { background: #1a2a26; }
    .card.c-away     { background: #2a1a20; }
    .card.c-partaway { background: #2a2016; }
    .card.past       { opacity: 0.22; }
    @keyframes today-glow {
      0%,100% { box-shadow: 0 6px 24px rgba(80,160,255,0.4), 0 0 0 0 rgba(80,160,255,0.15); }
      50%      { box-shadow: 0 6px 24px rgba(80,160,255,0.4), 0 0 0 8px rgba(80,160,255,0); }
    }
    .card.today {
      border: 2px solid #4a9ef5;
      animation: today-glow 2.2s ease-in-out infinite;
      transform: scale(1.012);
      z-index: 1;
    }
    .card-date {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 6px;
    }
    .card.c-home     .card-date { background: #203830; }
    .card.c-away     .card-date { background: #3a2028; }
    .card.c-partaway .card-date { background: #382a18; }
    .card-dow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.04em; }
    .card.weekday .card-dow { color: #9080c8; }
    .card.sat     .card-dow { color: #60a8e0; }
    .card.sun     .card-dow, .card.holiday .card-dow { color: #e06070; }
    .card-day { font-size: 2.5rem; font-weight: 900; line-height: 1.0; }
    .card.weekday .card-day { color: #d8d0f0; }
    .card.sat     .card-day { color: #60a8e0; }
    .card.sun     .card-day, .card.holiday .card-day { color: #e06070; }
    .card.today   .card-day { color: #4a9ef5 !important; }
    @keyframes dot-blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }
    .today-dot {
      width: 8px; height: 8px;
      background: #4a9ef5;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(74,158,245,0.6);
      animation: dot-blink 1.5s ease-in-out infinite;
    }
    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 14px 8px 14px;
      gap: 3px;
    }
    .status-main { font-size: 1.2rem; font-weight: 900; color: #e8e0ff; line-height: 1.2; }
    .time-sub { font-size: 0.88rem; font-weight: 600; color: #9080c0; letter-spacing: 0.01em; margin-top: 1px; }
    .home-row { display: flex; align-items: center; gap: 8px; }
    .home-icon  { font-size: 1.6rem; line-height: 1; }
    .home-label { font-size: 1.2rem; font-weight: 900; color: #e8e0ff; }
    .area-tag {
      display: inline-block;
      font-size: 0.65rem; font-weight: 700; color: #a090e0;
      background: rgba(120,100,220,0.2);
      border: 1.5px solid rgba(120,100,220,0.35);
      border-radius: 20px;
      padding: 1px 8px;
      vertical-align: middle;
      margin-left: 4px;
    }

    /* クイズ */
    .quiz {
      margin-top: 5px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(160,140,220,0.2);
      border-radius: 10px;
      padding: 5px 9px 4px;
      transition: background 0.15s;
    }
    .quiz:active { background: rgba(255,255,255,0.09); }
    .quiz-q {
      font-size: 0.7rem;
      color: #9080c8;
      line-height: 1.4;
    }
    .quiz-hint {
      font-size: 0.52rem;
      color: #5a4a80;
      margin-top: 2px;
      letter-spacing: 0.03em;
    }
    .quiz-a {
      font-size: 0.7rem;
      color: #90d890;
      line-height: 1.4;
      display: none;
    }
    .quiz.open .quiz-q { display: none; }
    .quiz.open .quiz-hint { display: none; }
    .quiz.open .quiz-a { display: block; }

    .week-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .week-btn {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
      border: 2px solid #3a3060;
      background: transparent;
      color: #6858a0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .week-btn.active {
      background: #3a3060;
      color: #c0b8e8;
      border-color: #3a3060;
    }
    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6858a0;
      font-size: 0.9rem;
      font-weight: 600;
    }
    #error-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e06070;
      font-size: 0.8rem;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
<div class="page-title">📅 けんの予定</div>
<div class="week-toggle">
  <button class="week-btn active" id="btn-this" onclick="switchWeek('this')">今週</button>
  <button class="week-btn" id="btn-next" onclick="switchWeek('next')">来週</button>
</div>
<div id="loading">よみこみちゅう…</div>
<div id="cards" style="display:none"></div>
<div id="error-msg" style="display:none"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbytjrZgr0GddGKk0bfdJK09sIqL8ex_1C4MyN0zefdmz8qHF31uL2qduwHlDbi5uTA/exec";

const QUIZZES = [
  // 動物
  { q:"🐙 タコの心臓はいくつ？", a:"3つ！しかも全部同時に動いている" },
  { q:"🐻‍❄️ シロクマの毛は実は何色？", a:"透明！皮膚が黒くて、光の乱反射で白く見えるだけ" },
  { q:"🦒 キリンが1日に眠る時間はどのくらい？", a:"約30分！外敵を警戒しながら少しずつ眠っている" },
  { q:"🦩 フラミンゴが白くなるのはなぜ？", a:"白いエサだけ食べると白くなる。ピンクはエビや藻の色素のせい" },
  { q:"🐬 イルカが眠るとき脳はどうなる？", a:"脳の半分だけ休んで残り半分で泳ぎ続ける。片目も開いたまま" },
  { q:"🦦 ラッコが眠るとき流されないようにどうする？", a:"昆布に体を巻きつける。自然のアンカーを使った賢い寝方" },
  { q:"🐘 ゾウにできない動きは？", a:"ジャンプ！4本の足が同時に地面を離れることがない" },
  { q:"🦈 サメの体の中に骨はある？", a:"ない！全身が軟骨。だから化石になりにくく歯だけが残る" },
  { q:"🐦‍⬛ カラスがクルミを割るために使う道具は？", a:"車！信号待ちのクルマにクルミを轢かせる知恵者がいる" },
  { q:"🍯 ミツバチが一生で集めるハチミツの量は？", a:"ティースプーン1杯分だけ。一生を捧げてその量" },
  { q:"🐟 金魚の記憶は3秒って本当？", a:"ウソ！実は数ヶ月は覚えている。かなり頭のいい魚" },
  { q:"🐝 ハチが1秒間に羽ばたく回数は？", a:"約200回！だからあの「ブーン」という音が鳴る" },
  // 歴史・偉人
  { q:"📜 日本で初めてカレーライスを食べたのは誰？", a:"明治維新の立役者・西郷隆盛。1870年代に初めて食べたと記録がある" },
  { q:"🍎 ニュートンがリンゴから思いついたのは？", a:"万有引力の法則。ただしリンゴが頭に落ちたのは後から作られた伝説らしい" },
  { q:"🎨 モナリザの眉毛はどうなっている？", a:"ない！描かれていない。当時の貴婦人のファッションで眉を剃るのが流行だった" },
  { q:"🚀 人類が初めて月に降り立ったのはいつ？", a:"1969年7月20日。アポロ11号のアームストロング船長" },
  { q:"🗼 エッフェル塔は最初どう思われていた？", a:"「醜い鉄くず」と大批判！今では年間700万人が訪れる世界一の観光地に" },
  { q:"🎭 シェイクスピアの作品数は？", a:"戯曲37作品、詩154編以上。約20年間で書き続けた" },
  { q:"⚡ エジソンが最初に発明したのは電球？", a:"違う！最初の発明は「票数記録機」。でも誰も買ってくれなかった" },
  { q:"🎹 ベートーヴェンが第九を作ったとき、耳はどうだった？", a:"ほぼ完全に聴こえない状態だった。音を感じるために床に直接耳を当てて作曲した" },
  { q:"🏯 大阪城を最初に建てたのは誰？", a:"豊臣秀吉。でも現在の天守閣は江戸時代に徳川氏が建て直したもの" },
  { q:"✈️ ライト兄弟の初飛行の時間はどのくらい？", a:"たった12秒間！距離は36m。でもこれが空の旅の始まりになった" },
  // おもしろ科学・雑学
  { q:"🌙 月まで歩いていったら何年かかる？", a:"約9年！時速5kmで歩き続けた場合" },
  { q:"🌍 地球の中心の温度は？", a:"約6000℃。太陽の表面とほぼ同じ温度" },
  { q:"🧠 人間の脳の重さはどのくらい？", a:"約1.4kg。豆腐2丁分くらい" },
  { q:"💤 人生の何割を眠って過ごす？", a:"約3分の1。80歳生きると約27年は寝ている計算" },
  { q:"🌿 酸素を一番多く作っているのは？", a:"森ではなく海！海のプランクトンが地球の酸素の半分以上を作る" },
  { q:"🎵 音と光どちらが速い？", a:"光！光は秒速30万km、音は秒速約340m。約90万倍の差" },
  { q:"🧊 氷は水より軽い？重い？", a:"軽い！だから氷は水に浮く。これがないと地球の海は全部凍っていた" },
  { q:"⚡ 雷1回のエネルギーで電球を何時間点けられる？", a:"約20分分。ものすごい迫力の割に意外と少ないエネルギー" },
  { q:"👃 鼻で感じられるニオイは何種類？", a:"約1兆種類！目で見える色は数百万色程度なのに鼻のほうがはるかに繊細" },
  // 日本・食・生活
  { q:"🗾 日本には島がいくつある？", a:"約14000島！そのうち人が住んでいるのは約430島" },
  { q:"🍜 ラーメンの「ラー」の意味は？", a:"中国語で「引っ張る」の意味。麺を手で引き伸ばして作るから" },
  { q:"🍣 回転寿司のベルトコンベアは誰が発明した？", a:"大阪の寿司職人・白石義明さん。ビール工場のベルトを見てひらめいた" },
  { q:"🎌 日本の国歌「君が代」の歌詞の長さは？", a:"わずか5句31文字。世界最短クラスの国歌" },
  { q:"📱 スマホの画面を1日何回タッチしている？", a:"平均約2600回。ヘビーユーザーは5000回以上" },
  { q:"🌈 虹は何色に見える？", a:"日本では7色だが、アメリカでは6色、アフリカには2色で表す国も" },
  { q:"🍎 りんごは何科の植物？", a:"バラ科！イチゴも桃も梅もみんなバラ科の仲間" },
  { q:"🏃 人間が走れる最高速度（記録）は？", a:"時速45km！ウサイン・ボルトが100m走中に記録した瞬間最高速度" },
];

function getQuiz(dateStr) {
  const d = new Date(dateStr);
  const idx = (d.getFullYear() * 366 + d.getMonth() * 31 + d.getDate()) % QUIZZES.length;
  return QUIZZES[idx];
}

let scheduleData = null;
let viewMode = 'this';

function switchWeek(mode) {
  viewMode = mode;
  document.getElementById('btn-this').className = 'week-btn' + (mode === 'this' ? ' active' : '');
  document.getElementById('btn-next').className = 'week-btn' + (mode === 'next' ? ' active' : '');
  if (scheduleData) renderCards(scheduleData);
}

const pad = n => String(n).padStart(2, "0");
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function toggleQuiz(el) {
  el.classList.toggle('open');
}

function renderCards(data) {
  const today = todayStr();
  const wrap = document.getElementById("cards");
  wrap.style.cssText = "flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;";
  wrap.innerHTML = "";

  const lastDayOfWeek = data.week[data.week.length - 1].date;
  const isPastWeek = today > lastDayOfWeek;
  const thisWeek = isPastWeek ? data.nextWeek : data.week;
  const nextWeek = isPastWeek ? [] : data.nextWeek;

  const btnNext = document.getElementById('btn-next');
  btnNext.style.display = nextWeek.length > 0 ? '' : 'none';
  if (nextWeek.length === 0 && viewMode === 'next') viewMode = 'this';

  const activeWeek = (viewMode === 'next' && nextWeek.length > 0) ? nextWeek : thisWeek;

  activeWeek.forEach(e => {
    const isToday   = e.date === today;
    const isPast    = e.date < today;
    const isSat     = e.dow === "土";
    const isSun     = e.dow === "日";
    const isHoliday = e.holiday;
    const isWeekend = isSat || isSun || isHoliday;
    const typeClass = { home:"c-home", away:"c-away", partaway:"c-partaway" }[e.type] || "c-home";
    const dowClass  = isHoliday ? "holiday" : isSat ? "sat" : isSun ? "sun" : "weekday";
    const holLabel  = isHoliday ? "🎌" : "";
    const areaTag   = e.area ? `<span class="area-tag">@${e.area}</span>` : "";

    let mainHTML = "";
    if (e.type === "home") {
      const label = isWeekend ? "おやすみ！おうちにいます" : "おうちにいます";
      mainHTML = `<div class="home-row"><span class="home-icon">🏠</span><span class="home-label">${label}</span></div>`;
    } else if (e.type === "away") {
      if (e.leave && e.back) {
        mainHTML = `<div class="status-main">でかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
      } else {
        mainHTML = `<div class="status-main">でかけます ${areaTag}</div>`;
      }
    } else {
      mainHTML = `<div class="status-main">夜からでかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    }

    const todayDotHTML = isToday ? `<div class="today-dot"></div>` : "";
    const quiz = getQuiz(e.date);

    wrap.innerHTML += `
      <div class="card ${typeClass} ${dowClass}${isToday ? " today" : ""}${isPast ? " past" : ""}">
        <div class="card-date">
          <div class="card-dow">${e.dow}曜${holLabel}</div>
          <div class="card-day">${e.d}</div>
          ${todayDotHTML}
        </div>
        <div class="card-body">
          ${mainHTML}
          <div class="quiz" onclick="toggleQuiz(this)">
            <div class="quiz-q">❓ ${quiz.q}</div>
            <div class="quiz-a">💡 ${quiz.a}</div>
          </div>
        </div>
      </div>`;
  });
}

function loadSchedule() {
  const callbackName = 'gasCallback_' + Date.now();
  const script = document.createElement('script');
  const timer = setTimeout(() => {
    delete window[callbackName];
    document.head.removeChild(script);
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = '';
    errEl.textContent = "よみこみに失敗しました。\nWi-Fiに繋がっているか確認してください。";
  }, 10000);
  window[callbackName] = function(data) {
    clearTimeout(timer);
    delete window[callbackName];
    document.head.removeChild(script);
    scheduleData = data;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('cards').style.display = '';
    renderCards(scheduleData);
  };
  script.src = GAS_URL + '?callback=' + callbackName;
  document.head.appendChild(script);
}

loadSchedule();
setInterval(loadSchedule, 30 * 60 * 1000);
</script>
</body>
</html>
