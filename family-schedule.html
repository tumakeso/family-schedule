<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パパどこ？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #f0eef8;
      color: #2e2040;
      height: 100dvh;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .page-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #a090c0;
      text-align: center;
      flex-shrink: 0;
    }
    .card {
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.09);
      position: relative;
      background: #fff;
    }
    .card.c-home     { background: #eaf8f2; }
    .card.c-away     { background: #fdeaed; }
    .card.c-partaway { background: #fff4e6; }
    .card.past       { opacity: 0.25; }
    @keyframes today-glow {
      0%,100% { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 0 rgba(60,160,255,0.2); }
      50%      { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 8px rgba(60,160,255,0); }
    }
    .card.today {
      border: 3px solid #3c9ef5;
      animation: today-glow 2.2s ease-in-out infinite;
      transform: scale(1.012);
      z-index: 1;
    }
    .card-date {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 6px;
    }
    .card.c-home     .card-date { background: #c4f0dc; }
    .card.c-away     .card-date { background: #f9c8d2; }
    .card.c-partaway .card-date { background: #ffd9a8; }
    .card-dow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.04em; }
    .card.weekday .card-dow { color: #5a4a80; }
    .card.sat     .card-dow { color: #1a7acc; }
    .card.sun     .card-dow, .card.holiday .card-dow { color: #c02828; }
    .card-day { font-size: 2.5rem; font-weight: 900; line-height: 1.0; }
    .card.weekday .card-day { color: #2e2040; }
    .card.sat     .card-day { color: #1a7acc; }
    .card.sun     .card-day, .card.holiday .card-day { color: #c02828; }
    .card.today   .card-day { color: #1a7acc !important; }
    @keyframes dot-blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }
    .today-dot {
      width: 8px; height: 8px;
      background: #3c9ef5;
      border-radius: 50%;
      box-shadow: 0 0 5px 2px rgba(60,158,245,0.5);
      animation: dot-blink 1.5s ease-in-out infinite;
    }
    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 16px 8px 14px;
      gap: 4px;
    }
    .status-main { font-size: 1.25rem; font-weight: 900; color: #2e2040; line-height: 1.2; }
    .time-sub { font-size: 0.9rem; font-weight: 600; color: #8070a8; letter-spacing: 0.01em; margin-top: 2px; }
    .home-row { display: flex; align-items: center; gap: 8px; }
    .home-icon  { font-size: 1.7rem; line-height: 1; }
    .home-label { font-size: 1.25rem; font-weight: 900; color: #2e2040; }
    .area-tag {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; color: #5538a8;
      background: rgba(100,80,200,0.1);
      border: 1.5px solid rgba(100,80,200,0.25);
      border-radius: 20px;
      padding: 1px 8px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .week-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .week-btn {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
      border: 2px solid #c0b0e0;
      background: transparent;
      color: #a090c0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .week-btn.active {
      background: #c0b0e0;
      color: #fff;
      border-color: #c0b0e0;
    }
    #loading {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a090c0;
      font-size: 0.9rem;
      font-weight: 600;
    }
    #error-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c04040;
      font-size: 0.8rem;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>
<div class="page-title">📅 けんの予定</div>
<div class="week-toggle">
  <button class="week-btn active" id="btn-this" onclick="switchWeek('this')">今週</button>
  <button class="week-btn" id="btn-next" onclick="switchWeek('next')">来週</button>
</div>
<div id="loading">よみこみちゅう…</div>
<div id="cards" style="display:none"></div>
<div id="error-msg" style="display:none"></div>

<script>
// ▼ GASデプロイ後にURLをここに貼り付けてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbytjrZgr0GddGKk0bfdJK09sIqL8ex_1C4MyN0zefdmz8qHF31uL2qduwHlDbi5uTA/exec";

let scheduleData = null;
let viewMode = 'this';

function switchWeek(mode) {
  viewMode = mode;
  document.getElementById('btn-this').className = 'week-btn' + (mode === 'this' ? ' active' : '');
  document.getElementById('btn-next').className = 'week-btn' + (mode === 'next' ? ' active' : '');
  if (scheduleData) renderCards(scheduleData);
}

const pad = n => String(n).padStart(2, "0");
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function renderCards(data) {
  const today = todayStr();
  const wrap = document.getElementById("cards");
  wrap.style.cssText = "flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;";
  wrap.innerHTML = "";

  const lastDayOfWeek = data.week[data.week.length - 1].date;
  const isPastWeek = today > lastDayOfWeek;
  const thisWeek = isPastWeek ? data.nextWeek : data.week;
  const nextWeek = isPastWeek ? [] : data.nextWeek;

  const btnNext = document.getElementById('btn-next');
  btnNext.style.display = nextWeek.length > 0 ? '' : 'none';
  if (nextWeek.length === 0 && viewMode === 'next') viewMode = 'this';

  const activeWeek = (viewMode === 'next' && nextWeek.length > 0) ? nextWeek : thisWeek;

  activeWeek.forEach(e => {
    const isToday   = e.date === today;
    const isPast    = e.date < today;
    const isSat     = e.dow === "土";
    const isSun     = e.dow === "日";
    const isHoliday = e.holiday;
    const isWeekend = isSat || isSun || isHoliday;
    const typeClass = { home:"c-home", away:"c-away", partaway:"c-partaway" }[e.type] || "c-home";
    const dowClass  = isHoliday ? "holiday" : isSat ? "sat" : isSun ? "sun" : "weekday";
    const holLabel  = isHoliday ? "🎌" : "";
    const areaTag   = e.area ? `<span class="area-tag">@${e.area}</span>` : "";

    let mainHTML = "";
    if (e.type === "home") {
      const label = isWeekend ? "おやすみ！おうちにいます" : "おうちにいます";
      mainHTML = `<div class="home-row"><span class="home-icon">🏠</span><span class="home-label">${label}</span></div>`;
    } else if (e.type === "away") {
      if (e.leave && e.back) {
        mainHTML = `<div class="status-main">でかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
      } else {
        mainHTML = `<div class="status-main">でかけます ${areaTag}</div>`;
      }
    } else {
      mainHTML = `<div class="status-main">夜からでかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    }

    const todayDotHTML = isToday ? `<div class="today-dot"></div>` : "";

    wrap.innerHTML += `
      <div class="card ${typeClass} ${dowClass}${isToday ? " today" : ""}${isPast ? " past" : ""}">
        <div class="card-date">
          <div class="card-dow">${e.dow}曜${holLabel}</div>
          <div class="card-day">${e.d}</div>
          ${todayDotHTML}
        </div>
        <div class="card-body">
          ${mainHTML}
        </div>
      </div>`;
  });
}

async function loadSchedule() {
  try {
    const res = await fetch(GAS_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    scheduleData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('cards').style.display = '';
    renderCards(scheduleData);
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    const errEl = document.getElementById('error-msg');
    errEl.style.display = '';
    errEl.textContent = "よみこみに失敗しました。\nWi-Fiに繋がっているか確認してください。";
  }
}

loadSchedule();
// 30分ごとに自動更新
setInterval(loadSchedule, 30 * 60 * 1000);
</script>
</body>
</html>
