<!DOCTYPE html><!-- updated:2026-04-04 -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パパどこ？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #f0eef8;
      color: #2e2040;
      height: 100dvh;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .page-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #a090c0;
      text-align: center;
      flex-shrink: 0;
    }
    .card {
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.09);
      position: relative;
      background: #fff;
    }
    .card.c-home     { background: #eaf8f2; }
    .card.c-away     { background: #fdeaed; }
    .card.c-partaway { background: #fff4e6; }
    .card.past       { opacity: 0.25; }
    @keyframes today-glow {
      0%,100% { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 0 rgba(60,160,255,0.2); }
      50%      { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 8px rgba(60,160,255,0); }
    }
    .card.today {
      border: 3px solid #3c9ef5;
      animation: today-glow 2.2s ease-in-out infinite;
      transform: scale(1.012);
      z-index: 1;
    }
    .card-date {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 6px;
    }
    .card.c-home     .card-date { background: #c4f0dc; }
    .card.c-away     .card-date { background: #f9c8d2; }
    .card.c-partaway .card-date { background: #ffd9a8; }
    .card-dow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.04em; }
    .card.weekday .card-dow { color: #5a4a80; }
    .card.sat     .card-dow { color: #1a7acc; }
    .card.sun     .card-dow, .card.holiday .card-dow { color: #c02828; }
    .card-day { font-size: 2.5rem; font-weight: 900; line-height: 1.0; }
    .card.weekday .card-day { color: #2e2040; }
    .card.sat     .card-day { color: #1a7acc; }
    .card.sun     .card-day, .card.holiday .card-day { color: #c02828; }
    .card.today   .card-day { color: #1a7acc !important; }
    @keyframes dot-blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }
    .today-dot {
      width: 8px; height: 8px;
      background: #3c9ef5;
      border-radius: 50%;
      box-shadow: 0 0 5px 2px rgba(60,158,245,0.5);
      animation: dot-blink 1.5s ease-in-out infinite;
    }
    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 16px 8px 14px;
      gap: 4px;
    }
    .status-main { font-size: 1.25rem; font-weight: 900; color: #2e2040; line-height: 1.2; }
    .time-sub { font-size: 0.9rem; font-weight: 600; color: #8070a8; letter-spacing: 0.01em; margin-top: 2px; }
    .home-row { display: flex; align-items: center; gap: 8px; }
    .home-icon  { font-size: 1.7rem; line-height: 1; }
    .home-label { font-size: 1.25rem; font-weight: 900; color: #2e2040; }
    .area-tag {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; color: #5538a8;
      background: rgba(100,80,200,0.1);
      border: 1.5px solid rgba(100,80,200,0.25);
      border-radius: 20px;
      padding: 1px 8px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .card-fact { font-size: 0.6rem; color: #9080b0; line-height: 1.3; text-align: left; }
    .week-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .week-btn {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
      border: 2px solid #c0b0e0;
      background: transparent;
      color: #a090c0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .week-btn.active {
      background: #c0b0e0;
      color: #fff;
      border-color: #c0b0e0;
    }
  </style>
</head>
<body>
<div class="page-title">📅 けんの予定</div>
<div class="week-toggle">
  <button class="week-btn active" id="btn-this" onclick="switchWeek('this')">今週</button>
  <button class="week-btn" id="btn-next" onclick="switchWeek('next')">来週</button>
</div>
<div id="cards"></div>
<script>
const WEEK = [
  {
    date:"2026-03-30", dow:"月", d:"30",
    type:"home",
    holiday:false,
    fact:"1867年3月30日、アメリカがロシアからアラスカを720万ドルで購入した。当時は「馬鹿げた買い物」と批判されたが後に石油・資源の宝庫と判明🗺️",
    silly:"カメは視覚が非常に優れており、人間には見えない紫外線まで識別できる。カメの目に映る世界はさぞカラフルだろう🐢"
  },
  {
    date:"2026-03-31", dow:"火", d:"31",
    type:"away", leave:"07:30", back:"21:15",
    holiday:false,
    fact:"1889年3月31日、エッフェル塔がパリで完成した。当初は「醜い鉄くず」と批判されたが、今やパリの象徴的存在🗼",
    silly:"サメは生涯で最大3万本の歯が生え替わる。1列失うと後ろの列が前に出てくるコンベヤーベルト式の歯列管理🦷"
  },
  {
    date:"2026-04-01", dow:"水", d:"1",
    type:"away", leave:"07:30", back:"20:00",
    holiday:false,
    fact:"1976年4月1日、スティーブ・ジョブズらがアップルを創業した。エイプリルフールに世界を変える会社が誕生した🍎",
    silly:"ウォンバットは世界で唯一、四角いフンをする動物だ。縄張りマーカーが転がらないよう進化したと考えられている🟫"
  },
  {
    date:"2026-04-02", dow:"木", d:"2",
    type:"home",
    holiday:false,
    fact:"1982年4月2日、アルゼンチンがフォークランド諸島に侵攻し英国との紛争が勃発した。わずか74日間の短期戦争🇬🇧",
    silly:"アリは自分の体重の50倍の重さを持ち上げられる。人間に換算すると約3〜5トンの車を担ぎ上げる計算になる🐜"
  },
  {
    date:"2026-04-03", dow:"金", d:"3",
    type:"home",
    holiday:false,
    fact:"1973年4月3日、モトローラのエンジニアが世界初の携帯電話通話を行った。機器の重量は約1kg、充電に10時間かかった📱",
    silly:"ペンギンはプロポーズに石を贈る。オスが選んだ石をメスの足元に置き、受け取ってもらえたらカップル成立だ🐧"
  },
  {
    date:"2026-04-04", dow:"土", d:"4",
    type:"home",
    holiday:false,
    fact:"1968年4月4日、キング牧師がメンフィスのホテルで暗殺された。公民権運動の象徴的指導者を失った歴史的悲劇✊",
    silly:"タヌキは天敵に出会うと本当に死んだふりをする。「たぬき寝入り」という言葉は本当の話だったんです🦝"
  },
  {
    date:"2026-04-05", dow:"日", d:"5",
    type:"home",
    holiday:false,
    fact:"1722年4月5日、オランダの探検家がイースター島を発見した。巨大なモアイ像の建造の謎は今なお続く🗿",
    silly:"ゾウは4本の足すべてを同時に地面から離せない唯一の哺乳類だ。だからジャンプは物理的に不可能なんです🐘"
  }
];

const NEXT_WEEK = [
  {
    date:"2026-04-06", dow:"月", d:"6",
    type:"partaway", leave:"16:30", back:"21:00",
    holiday:false,
    fact:"1896年4月6日、アテネで第1回近代オリンピックが開幕した。14カ国241選手が参加した歴史的なスポーツの祭典🏟️",
    silly:"ミツバチが一生かけて作るハチミツはティースプーン1杯ほど。トーストに塗る量のためにハチ一匹の一生が費やされる🍯"
  },
  {
    date:"2026-04-07", dow:"火", d:"7",
    type:"home",
    holiday:false,
    fact:"1795年4月7日、フランスがメートル法を正式採用した。世界を1つの単位系でつなぐ大きな一歩となった📏",
    silly:"カバは汗の代わりに赤い液体を分泌する。日焼け止めと抗菌剤の役割を果たす天然のスキンケア液だ🦛"
  },
  {
    date:"2026-04-08", dow:"水", d:"8",
    type:"home",
    holiday:false,
    fact:"1820年4月8日、ミロのヴィーナス像がギリシャの農民によって発見された。発見時は両腕があったという説もある🏛️",
    silly:"ネコが狭い箱に入りたがるのは囲まれた空間が安心感を与えるため。進化の本能が今も箱の中で生きている📦"
  },
  {
    date:"2026-04-09", dow:"木", d:"9",
    type:"away", leave:"07:30", back:"18:00",
    holiday:false,
    fact:"1865年4月9日、南北戦争でリー将軍が降伏した。4年間の内戦にようやく終止符が打たれたアメリカの歴史的な日⚔️",
    silly:"クモは足を動かすのに筋肉でなく血圧を使う。血圧で足を伸縮させる、まるで油圧式ロボットのような構造だ🕷️"
  },
  {
    date:"2026-04-10", dow:"金", d:"10",
    type:"away", leave:"08:00", back:"18:00",
    holiday:false,
    fact:"1912年4月10日、タイタニック号がサウサンプトン港を出港した。4日後に沈没するとは誰も思っていなかった🚢",
    silly:"ラッコは水中で眠るとき昆布に体を巻きつけて流されないようにする。自然界のアンカーをフル活用した賢い寝方🦦"
  },
  {
    date:"2026-04-11", dow:"土", d:"11",
    type:"home",
    holiday:false,
    fact:"1970年4月11日、アポロ13号が打ち上げられた。2日後に酸素タンクが爆発し、乗組員3名の奇跡の生還劇が始まった🚀",
    silly:"シロクマの毛は実は透明で中が空洞。光が乱反射して白く見えるだけで、皮膚は真っ黒な不思議な生き物だ🐻‍❄️"
  },
  {
    date:"2026-04-12", dow:"日", d:"12",
    type:"home",
    holiday:false,
    fact:"1961年4月12日、ソ連のガガーリン飛行士が人類初の宇宙飛行を達成した。「地球は青かった」という言葉は今も語り継がれる🌍",
    silly:"イルカは眠るとき脳の半分だけを休ませ、残り半分で泳ぎ続ける。片目を開けたまま眠れるマルチタスクの達人だ🐬"
  }
];

let viewMode = 'this';
function switchWeek(mode) {
  viewMode = mode;
  document.getElementById('btn-this').className = 'week-btn' + (mode==='this'?' active':'');
  document.getElementById('btn-next').className = 'week-btn' + (mode==='next'?' active':'');
  renderCards();
}

const pad = n => String(n).padStart(2,"0");
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function renderCards() {
  const today = todayStr();
  const wrap  = document.getElementById("cards");
  wrap.style.cssText = "flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;";
  wrap.innerHTML = "";
  const activeWeek = (viewMode === 'next' && NEXT_WEEK.length > 0) ? NEXT_WEEK : WEEK;
  activeWeek.forEach((e, idx) => {
    const isToday   = e.date === today;
    const isPast    = e.date < today;
    const isSat     = e.dow === "土";
    const isSun     = e.dow === "日";
    const isHoliday = e.holiday;
    const isWeekend = isSat || isSun || isHoliday;
    const typeClass = { home:"c-home", away:"c-away", partaway:"c-partaway" }[e.type];
    const dowClass  = isHoliday ? "holiday" : isSat ? "sat" : isSun ? "sun" : "weekday";
    const holLabel  = isHoliday ? "🎌" : "";
    const areaTag   = e.area ? `<span class="area-tag">@${e.area}</span>` : "";
    let mainHTML = "";
    if (e.type === "home") {
      const label = isWeekend ? "おやすみ！おうちにいます" : "おうちにいます";
      mainHTML = `<div class="home-row"><span class="home-icon">🏠</span><span class="home-label">${label}</span></div>`;
    } else if (e.type === "away") {
      mainHTML = `<div class="status-main">でかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    } else {
      mainHTML = `<div class="status-main">夜からでかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    }
    const todayDotHTML = isToday ? `<div class="today-dot"></div>` : "";
    const factHTML = idx % 2 === 0 ? "📖 " + e.fact : "💬 " + e.silly;
    wrap.innerHTML += `
      <div class="card ${typeClass} ${dowClass}${isToday?" today":""}${isPast?" past":""}">
        <div class="card-date">
          <div class="card-dow">${e.dow}曜${holLabel}</div>
          <div class="card-day">${e.d}</div>
          ${todayDotHTML}
        </div>
        <div class="card-body">
          ${mainHTML}
          <div class="card-fact">${factHTML}</div>
        </div>
      </div>`;
  });
}
renderCards();
setInterval(renderCards, 30 * 60 * 1000);
</script>
</body>
</html>
