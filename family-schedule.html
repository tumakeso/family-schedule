<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パパどこ？</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #f0eef8;
      color: #2e2040;
      height: 100dvh;
      padding: 10px 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .page-title {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #a090c0;
      text-align: center;
      flex-shrink: 0;
    }
    .card {
      flex: 1;
      min-height: 0;
      border-radius: 20px;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.09);
      position: relative;
      background: #fff;
    }
    .card.c-home     { background: #eaf8f2; }
    .card.c-away     { background: #fdeaed; }
    .card.c-partaway { background: #fff4e6; }
    .card.past       { opacity: 0.25; }
    @keyframes today-glow {
      0%,100% { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 0 rgba(60,160,255,0.2); }
      50%      { box-shadow: 0 6px 22px rgba(60,160,255,0.45), 0 0 0 8px rgba(60,160,255,0); }
    }
    .card.today {
      border: 3px solid #3c9ef5;
      animation: today-glow 2.2s ease-in-out infinite;
      transform: scale(1.012);
      z-index: 1;
    }
    .card-date {
      width: 72px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 10px 6px;
    }
    .card.c-home     .card-date { background: #c4f0dc; }
    .card.c-away     .card-date { background: #f9c8d2; }
    .card.c-partaway .card-date { background: #ffd9a8; }
    .card-dow { font-size: 0.8rem; font-weight: 700; letter-spacing: 0.04em; }
    .card.weekday .card-dow { color: #5a4a80; }
    .card.sat     .card-dow { color: #1a7acc; }
    .card.sun     .card-dow, .card.holiday .card-dow { color: #c02828; }
    .card-day { font-size: 2.5rem; font-weight: 900; line-height: 1.0; }
    .card.weekday .card-day { color: #2e2040; }
    .card.sat     .card-day { color: #1a7acc; }
    .card.sun     .card-day, .card.holiday .card-day { color: #c02828; }
    .card.today   .card-day { color: #1a7acc !important; }
    @keyframes dot-blink {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.3; transform: scale(0.6); }
    }
    .today-dot {
      width: 8px; height: 8px;
      background: #3c9ef5;
      border-radius: 50%;
      box-shadow: 0 0 5px 2px rgba(60,158,245,0.5);
      animation: dot-blink 1.5s ease-in-out infinite;
    }
    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 16px 8px 14px;
      gap: 4px;
    }
    .status-main { font-size: 1.25rem; font-weight: 900; color: #2e2040; line-height: 1.2; }
    .time-sub { font-size: 0.9rem; font-weight: 600; color: #8070a8; letter-spacing: 0.01em; margin-top: 2px; }
    .home-row { display: flex; align-items: center; gap: 8px; }
    .home-icon  { font-size: 1.7rem; line-height: 1; }
    .home-label { font-size: 1.25rem; font-weight: 900; color: #2e2040; }
    .area-tag {
      display: inline-block;
      font-size: 0.68rem; font-weight: 700; color: #5538a8;
      background: rgba(100,80,200,0.1);
      border: 1.5px solid rgba(100,80,200,0.25);
      border-radius: 20px;
      padding: 1px 8px;
      vertical-align: middle;
      margin-left: 4px;
    }
    .card-fact { font-size: 0.6rem; color: #9080b0; line-height: 1.3; text-align: left; }
    .week-toggle {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .week-btn {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 14px;
      border-radius: 20px;
      border: 2px solid #c0b0e0;
      background: transparent;
      color: #a090c0;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.2s;
    }
    .week-btn.active {
      background: #c0b0e0;
      color: #fff;
      border-color: #c0b0e0;
    }
  </style>
</head>
<body>
<div class="page-title">📅 けんの予定</div>
<div class="week-toggle">
  <button class="week-btn active" id="btn-this" onclick="switchWeek('this')">今週</button>
  <button class="week-btn" id="btn-next" onclick="switchWeek('next')">来週</button>
</div>
<div id="cards"></div>
<script>
const WEEK = [
  {
    date:"2026-03-23", dow:"月", d:"23",
    type:"away", leave:"07:30", back:"22:00",
    holiday:false,
    fact:"1839年3月23日、ボストンの新聞が「OK（オーケー）」という言葉を初めて紙面に使用した。世界で最も有名な略語のひとつが生まれた日📝",
    silly:"コアラの指紋は人間のものとほぼ区別がつかない。犯罪捜査で混乱が起きないか、専門家たちが真剣に心配している🐨"
  },
  {
    date:"2026-03-24", dow:"火", d:"24",
    type:"home",
    holiday:false,
    fact:"1882年3月24日、ロベルト・コッホが結核菌の発見を発表した。当時の死因トップだった「白死病」の謎がついに解明された🔬",
    silly:"タコは3つの心臓を持ち、2つはエラ用・1つは体全体用。全力で泳ぐとメインの心臓が一時停止するため、歩きを好む💗"
  },
  {
    date:"2026-03-25", dow:"水", d:"25",
    type:"away", leave:"07:30", back:"19:00", area:"広島",
    holiday:false,
    fact:"1807年3月25日、英国議会が奴隷貿易廃止法を可決した。大西洋を渡る奴隷輸送を終わらせる歴史的な転換点となった⚖️",
    silly:"シマウマの縞模様は個体ごとに異なり、人間の指紋と同じように個体識別に使える。縞模様がアブなどの吸血虫を混乱させる効果もある🦓"
  },
  {
    date:"2026-03-26", dow:"木", d:"26",
    type:"away", leave:"08:00", back:"20:00", area:"広島",
    holiday:false,
    fact:"1953年3月26日、ジョナス・ソークがポリオワクチンの臨床試験成功を発表した。子どもたちを脅かし続けた感染症にようやく終止符💉",
    silly:"カワウソは眠るとき、流されないようにパートナーと手をつないで水面に浮かぶ「ラッコ・ホールド」をすることがある🦦"
  },
  {
    date:"2026-03-27", dow:"金", d:"27",
    type:"home",
    holiday:false,
    fact:"1977年3月27日、テネリフェ空港で747同士が滑走路上で衝突し583名が死亡。航空史上最多犠牲者を出した大惨事✈️",
    silly:"ネコは液体的性質を持つ、という研究でフランスの物理学者がイグノーベル賞を2017年に受賞した。どんな容器にも入るのがその証拠🐱"
  },
  {
    date:"2026-03-28", dow:"土", d:"28",
    type:"home",
    holiday:false,
    fact:"1979年3月28日、米ペンシルバニア州スリーマイル島原発で炉心溶融事故が発生した。米国史上最も深刻な原子力事故となった☢️",
    silly:"ウシは1日に最大200リットルもの唾液を分泌する。人間の約20〜40倍。口の中は常にびしょびしょ🐄"
  },
  {
    date:"2026-03-29", dow:"日", d:"29",
    type:"home",
    holiday:false,
    fact:"1461年3月29日、英国「薔薇戦争」最大の激戦タウトンの戦いが起きた。猛吹雪の中で数万人が命を落とした英国史上最も血みどろな戦闘⚔️",
    silly:"フラミンゴが片足で立つのは体温保持のため。足を折りたたんで体に近づけることで、冷たい水に触れる面積を最小限にしている🦩"
  }
];

const NEXT_WEEK = [
  {
    date:"2026-03-30", dow:"月", d:"30",
    type:"home",
    holiday:false,
    fact:"1867年3月30日、米国がロシアからアラスカを720万ドルで購入した。当時は「馬鹿げた買い物」と批判されたが後に石油・天然資源の宝庫と判明🗺️",
    silly:"カメは視覚が非常に優れており、人間には見えない紫外線まで識別できる。カメの目に映る世界はさぞカラフルで賑やかなことだろう🐢"
  },
  {
    date:"2026-03-31", dow:"火", d:"31",
    type:"away", leave:"09:00", back:"21:15",
    holiday:false,
    fact:"1889年3月31日、エッフェル塔がパリで完成し開業した。当初は「醜い鉄くず」と批判されたが、今やパリの象徴的存在🗼",
    silly:"サメは生涯で最大3万本の歯が生え替わる。1列失うと後ろの列が前に移動してくる、コンベヤーベルト式の歯列管理🦷"
  },
  {
    date:"2026-04-01", dow:"水", d:"1",
    type:"away", leave:"07:30", back:"19:00",
    holiday:false,
    fact:"1976年4月1日、スティーブ・ジョブズとスティーブ・ウォズニアックがアップルコンピュータを設立した。エイプリルフールを創業日に選んだ理由は謎🍎",
    silly:"ウォンバットは世界で唯一、四角いフンをする動物だ。縄張りマーカーが転がらないよう進化したと考えられているが、科学者も長年頭を悩ませた🟫"
  },
  {
    date:"2026-04-02", dow:"木", d:"2",
    type:"home",
    holiday:false,
    fact:"1982年4月2日、アルゼンチンがフォークランド諸島に侵攻し英国との「フォークランド紛争」が勃発した。わずか74日間の短期戦争🇬🇧",
    silly:"アリは自分の体重の50倍の重さを持ち上げられる。人間に換算すると約3〜5トンの車を担ぎ上げる計算になる🐜"
  },
  {
    date:"2026-04-03", dow:"金", d:"3",
    type:"home",
    holiday:false,
    fact:"1973年4月3日、モトローラのエンジニアが世界初の携帯電話通話を行った。機器の重量は約1kg、充電に10時間かかった📱",
    silly:"ペンギンはプロポーズに石を贈る。オスが気に入った石をメスの足元に置き、受け取ってもらえたらカップル成立。人間より分かりやすい🐧"
  },
  {
    date:"2026-04-04", dow:"土", d:"4",
    type:"home",
    holiday:false,
    fact:"1968年4月4日、キング牧師がメンフィスのホテルのバルコニーで暗殺された。公民権運動の象徴的指導者を失った歴史的悲劇✊",
    silly:"タヌキは「たぬき寝入り」という言葉通り、天敵に出会うと本当に死んだふりをすることがある。進化が慣用句を作り出した🦝"
  },
  {
    date:"2026-04-05", dow:"日", d:"5",
    type:"home",
    holiday:false,
    fact:"1722年4月5日、オランダの探検家ロッヘフェーンがイースター島を発見した。巨大なモアイ像の建造の謎は今なお続く🗿",
    silly:"ゾウは唯一、4本の足すべてを同時に地面から離せない哺乳類だ。そのためジャンプは物理的に不可能で、速歩きするだけ🐘"
  }
];

let viewMode = 'this';
function switchWeek(mode) {
  viewMode = mode;
  document.getElementById('btn-this').className = 'week-btn' + (mode==='this'?' active':'');
  document.getElementById('btn-next').className = 'week-btn' + (mode==='next'?' active':'');
  renderCards();
}

const pad = n => String(n).padStart(2,"0");
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function renderCards() {
  const today = todayStr();
  const wrap  = document.getElementById("cards");
  wrap.style.cssText = "flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;";
  wrap.innerHTML = "";
  const activeWeek = (viewMode === 'next' && NEXT_WEEK.length > 0) ? NEXT_WEEK : WEEK;
  activeWeek.forEach((e, idx) => {
    const isToday   = e.date === today;
    const isPast    = e.date < today;
    const isSat     = e.dow === "土";
    const isSun     = e.dow === "日";
    const isHoliday = e.holiday;
    const isWeekend = isSat || isSun || isHoliday;
    const typeClass = { home:"c-home", away:"c-away", partaway:"c-partaway" }[e.type];
    const dowClass  = isHoliday ? "holiday" : isSat ? "sat" : isSun ? "sun" : "weekday";
    const holLabel  = isHoliday ? "🎌" : "";
    const areaTag   = e.area ? `<span class="area-tag">@${e.area}</span>` : "";
    let mainHTML = "";
    if (e.type === "home") {
      const label = isWeekend ? "おやすみ！おうちにいます" : "おうちにいます";
      mainHTML = `<div class="home-row"><span class="home-icon">🏠</span><span class="home-label">${label}</span></div>`;
    } else if (e.type === "away") {
      mainHTML = `<div class="status-main">でかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    } else {
      mainHTML = `<div class="status-main">夜からでかけます ${areaTag}</div><div class="time-sub">🚪 ${e.leave} &nbsp;→&nbsp; 🏠 ${e.back}ごろ</div>`;
    }
    const todayDotHTML = isToday ? `<div class="today-dot"></div>` : "";
    const factHTML = idx % 2 === 0 ? "📖 " + e.fact : "💬 " + e.silly;
    wrap.innerHTML += `
      <div class="card ${typeClass} ${dowClass}${isToday?" today":""}${isPast?" past":""}">
        <div class="card-date">
          <div class="card-dow">${e.dow}曜${holLabel}</div>
          <div class="card-day">${e.d}</div>
          ${todayDotHTML}
        </div>
        <div class="card-body">
          ${mainHTML}
          <div class="card-fact">${factHTML}</div>
        </div>
      </div>`;
  });
}
renderCards();
setInterval(renderCards, 30 * 60 * 1000);
</script>
</body>
</html>
